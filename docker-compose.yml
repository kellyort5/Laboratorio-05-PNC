services:

  db:

    image: postgres:16

    container_name: hyrule-db

    environment:
      POSTGRES_DB: hyrule
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hyrule"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - hyrule-network

  api:

    build:
      context: .
      dockerfile: Dockerfile

    container_name: laboratorio03-api

    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}

    ports:
      - "8080:8080"

    depends_on:
      db:
        condition: service_healthy

    restart: unless-stopped

    networks:
      - hyrule-network

volumes:
  postgres_data:

networks:
  hyrule-network: